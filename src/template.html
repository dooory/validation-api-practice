<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Template</title>
    </head>
    <body>
        <div class="container">
            <form action="" id="signupForm">
                <h2>Signup Form</h2>
                <fieldset>
                    <fieldset>
                        <div class="field">
                            <label for="email">Email *</label>
                            <input
                                type="email"
                                name="email"
                                id="email"
                                required
                                autocomplete="off"
                            />
                        </div>
                        <div class="field">
                            <label for="password">Password *</label>
                            <input
                                type="password"
                                name="password"
                                minlength="10"
                                id="password"
                                autocomplete="off"
                                required
                            />
                        </div>
                        <div class="field">
                            <label for="confirmPassword"
                                >Confirm Password *</label
                            >
                            <input
                                type="password"
                                name="confirm-password"
                                minlength="10"
                                id="confirmPassword"
                                autocomplete="off"
                                required
                            />
                        </div>
                    </fieldset>
                    <fieldset>
                        <div class="field">
                            <label for="country">Country *</label>
                            <select
                                name="country"
                                id="country"
                                autocomplete="off"
                                required
                            >
                                <option value="placeholder" selected disabled>
                                    Select Country
                                </option>
                            </select>
                        </div>
                        <div class="field">
                            <label for="postcode">Postcode *</label>
                            <input
                                type="text"
                                name="postcode"
                                id="postcode"
                                required
                                disabled
                            />
                        </div>
                    </fieldset>
                </fieldset>
                <button class="submit-button" type="submit">Signup</button>
            </form>
        </div>
    </body>
</html>
